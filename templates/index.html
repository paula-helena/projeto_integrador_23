<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sistema de Contribuição</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Seu CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-light">

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow-lg p-4 rounded-4" style="width: 100%; max-width: 400px;">

        <div class="text-center mb-3">
            <h3>🔒 Acesso Restrito</h3>
            <p class="text-muted">Sistema de Gestão de Contribuições</p>
        </div>

        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}
              <div class="alert alert-danger text-center">
                {{ message }}
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('login') }}">

            <div class="mb-3">
                <label class="form-label">E-mail Corporativo</label>
                <input type="email" name="email" class="form-control" placeholder="exemplo@email.com" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="Sua senha" required>
            </div>

            <button type="submit" class="btn btn-primary w-100">
                Entrar no Sistema
            </button>
        </form>

        <div class="text-center mt-3">
            <small>
                Ainda não tem acesso?
                <a href="{{ url_for('registrar') }}">Crie sua conta</a>
            </small>
        </div>

        <div class="text-center mt-2">
            <small>
                <a href="#" onclick="alert('Por segurança, solicite o reset de senha ao administrador.')">
                    Esqueci minha senha
                </a>
            </small>
        </div>

    </div>
</div>

</body>
</html>
